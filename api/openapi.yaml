        - status
        - type
        - address
        - city
        - balcony
        - loggia
        - wardrobe
        - passengerElevator
        - freightElevator
        - parking
        - yard
        - concierge
        - chute
        - gas
        - furniture
        - appliances
        - internet
        - childrenAllowed
        - petsAllowed
        - smokingAllowed
        - createdAt
        - updatedAt
        - images
        - utilities
        - additionalServices
    ListPropertiesResponse:
      type: object
      properties:
        properties:
          type: array
          items:
            $ref: '#/components/schemas/PropertyResponse'
        total:
          type: number
          example: 42
      required:
        - properties
        - total
    PropertyRentTermsInputDto:
      type: object
      properties:
        rentAmount:
          type: string
          example: '50000.00'
        rentCurrency:
          type: string
          example: RUB
        rentPeriod:
          type: string
          enum:
            - MONTHLY
            - WEEKLY
            - QUARTERLY
            - YEARLY
        vatPercent:
          type: string
          example: '20.00'
        depositAmount:
          type: string
          example: '50000.00'
        depositCurrency:
          type: string
          example: RUB
        penaltyRate:
          type: string
          example: '0.5'
        penaltyGraceDays:
          type: number
          example: 5
      required:
        - rentAmount
        - rentCurrency
        - rentPeriod
    PropertyImageInputDto:
      type: object
      properties:
        url:
          type: string
          example: https://cdn.example.com/img.jpg
        order:
          type: number
          example: 0
