      responses:
        '201':
          description: ''
      security:
        - bearer: []
      summary: Add image to property
      tags:
        - Properties
  /properties/{id}/images/{imageId}:
    delete:
      operationId: PropertyController_removeImage
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: imageId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Remove image from property
