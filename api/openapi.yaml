        - bearer: []
      summary: Get contact by id
      tags:
        - crm
    patch:
      operationId: ContactsController_updateContact
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Update contact
      tags:
        - crm
    delete:
      operationId: ContactsController_deleteContact
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
