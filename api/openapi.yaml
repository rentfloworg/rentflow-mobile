            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Delete additional service
      tags:
        - Properties
  /crm/contacts:
    get:
      operationId: ContactsController_listContacts
      parameters:
        - name: type
          required: false
          in: query
          schema:
            type: string
            enum:
              - TENANT
              - LANDLORD
        - name: search
          required: false
          in: query
          schema:
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            type: number
      responses:
        '200':
          description: Paginated list of contacts
      security:
        - bearer: []
      summary: List contacts
      tags:
        - crm
    post:
      operationId: ContactsController_createContact
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
