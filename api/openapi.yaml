      description: Removes credentials for the given platform.
      operationId: IntegrationController_disconnectPlatform
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Disconnect platform
      tags:
        - Integration
  /integration/listings:
    get:
      description: Returns external listings filtered by property/platform/status.
      operationId: IntegrationController_listListings
      parameters:
        - name: propertyId
          required: false
          in: query
          schema:
            example: X6KBMTnCDkbrPN_I0YXG8
            type: string
        - name: platform
          required: false
          in: query
          schema:
            type: string
            enum:
              - AVITO
              - CIAN
              - SITE
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - UNPUBLISHED
              - MODERATION
              - PUBLISHED
              - PAUSED
              - ERROR
        - name: page
          required: false
          in: query
          schema:
            default: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            default: 20
            example: 20
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExternalListingResponse'
      security:
        - bearer: []
      summary: List external listings
      tags:
        - Integration
  /integration/publish:
    post:
      description: Creates external listing and pushes it to the platform.
      operationId: IntegrationController_publishListing
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishListingRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalListingResponse'
      security:
        - bearer: []
      summary: Publish listing to platform
      tags:
        - Integration
  /integration/unpublish:
    delete:
      description: Removes external listing on the given platform.
      operationId: IntegrationController_unpublishListing
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishListingRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Unpublish listing from platform
      tags:
        - Integration
  /integration/listings/{listingId}/sync:
    post:
      description: Refreshes counters and statuses for the given external listing.
      operationId: IntegrationController_syncListing
      parameters:
        - name: listingId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalListingResponse'
      security:
        - bearer: []
      summary: Sync listing
      tags:
        - Integration
  /integration/feed-url/{platform}:
    get:
      description: Returns a public feed URL for the platform aggregator.
      operationId: IntegrationController_getFeedUrl
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                properties:
                  url:
                    type: string
      security:
        - bearer: []
      summary: Get feed URL for platform
      tags:
        - Integration
  /integration/imports:
    post:
      description: Parses the given source URL and creates a draft PublicationImport.
      operationId: IntegrationController_startImport
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartImportRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationImportResponseDto'
      security:
        - bearer: []
      summary: Start publication import
      tags:
        - Integration
  /integration/imports/{id}:
    get:
      description: Returns publication import by id.
      operationId: IntegrationController_getImport
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationImportResponseDto'
      security:
        - bearer: []
      summary: Get publication import
      tags:
        - Integration
  /integration/imports/{id}/complete:
    post:
      description: Persists the parsed payload as a Property.
      operationId: IntegrationController_completeImport
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteImportRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationImportResponseDto'
      security:
        - bearer: []
      summary: Complete publication import
      tags:
        - Integration
  /integration/avito/oauth/url:
    get:
      description: >-
        Returns authorization URL and opaque state. Frontend should redirect to
        authorizationUrl.
      operationId: IntegrationController_getAvitoOauthUrl
      parameters:
        - name: scopes
          required: false
          in: query
          description: Override default OAuth scopes (comma-separated)
          schema:
            example: items:info,user:read
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Start Avito OAuth
      tags:
        - Integration
  /integration/avito/oauth/callback:
    post:
      description: >-
        Exchanges code+state for an access/refresh token pair and persists the
        PlatformConnection.
      operationId: IntegrationController_completeAvitoOauth
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteAvitoOauthRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'
      security:
        - bearer: []
      summary: Complete Avito OAuth
      tags:
        - Integration
  /integration/avito/connections/{connectionId}/items:
    get:
      description: >-
        Returns items from the connected Avito cabinet via the stored access
        token.
      operationId: IntegrationController_listAvitoItems
      parameters:
        - name: connectionId
          required: true
          in: path
          schema:
            type: string
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - PUBLISHED
              - PAUSED
              - MODERATION
              - REJECTED
              - EXPIRED
              - REMOVED
        - name: page
          required: false
          in: query
          schema:
            default: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            default: 25
            example: 25
            type: number
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: List Avito cabinet items
      tags:
        - Integration
  /integration/avito/connections/{connectionId}/items/import:
    post:
      description: >-
        Creates a Property + ExternalListing(PUBLISHED) row for each selected
        Avito item.
      operationId: IntegrationController_importAvitoItems
      parameters:
        - name: connectionId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportAvitoItemsRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Import Avito items as Properties
      tags:
        - Integration
  /notifications:
    get:
      operationId: NotificationsController_list
      parameters:
        - name: unread
          required: true
          in: query
          schema:
            type: string
        - name: limit
          required: true
          in: query
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: List notifications for current account
      tags:
        - notifications
  /notifications/unread-count:
    get:
      operationId: NotificationsController_unreadCount
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Count unread notifications
      tags:
        - notifications
  /notifications/{id}/read:
    patch:
      operationId: NotificationsController_markRead
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Mark single notification as read
      tags:
        - notifications
  /notifications/mark-all-read:
    post:
      operationId: NotificationsController_markAllRead
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Mark all notifications as read
      tags:
        - notifications
  /studio/leads:
    options:
      operationId: StudioController_preflightLeads
      parameters: []
      responses:
        '204':
          description: ''
      tags:
        - Studio
    post:
      description: >-
        Public endpoint called by the contact form on {slug}.rentflow.tech.
        Creates a Contact + Deal in CRM bound to propertyId and notifies the
        owner.
      operationId: StudioController_createLead
      parameters:
        - name: x-forwarded-for
          required: true
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudioLeadRequest'
      responses:
        '201':
          description: ''
      summary: Submit a lead from a published studio visit card
      tags:
        - Studio
info:
  title: RentFlow API
  description: API Gateway for RentFlow microservices
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          example: '2025-11-26T10:30:00.000Z'
      required:
        - status
        - timestamp
    SendOtpRequest:
      type: object
      properties:
        identifier:
          type: string
          example: '+79111234567'
        type:
          type: string
          example: phone
          enum:
            - phone
            - email
      required:
        - identifier
        - type
    VerifyOtpRequest:
      type: object
      properties:
        identifier:
          type: string
          example: '+79111234567'
        code:
          type: string
          example: '123456'
        type:
          type: string
          example: phone
          enum:
            - phone
            - email
      required:
        - identifier
        - code
        - type
    TelegramVerifyRequest:
      type: object
      properties:
        tgAuthResult:
          type: string
          example: eyJpZCI6NjE1NTg0Njk5MywiZmlyc3RfbmFtZSI6Ilx1MDQxMlx1MDQzMFx1MDQ...
      required:
        - tgAuthResult
    TelegramFinalizeRequest:
      type: object
      properties:
        sessionId:
          type: string
          example: 21a0885dee191ae17d1842db2aa426ee
      required:
        - sessionId
    UpdateAccountTypeRequest:
      type: object
      properties:
        accountType:
          type: string
          enum:
            - INDIVIDUAL
            - ENTREPRENEUR
            - COMPANY
          example: INDIVIDUAL
      required:
        - accountType
    UpdateTelegramRequest:
      type: object
      properties:
        telegramId:
          type: object
          example: '123456789'
          nullable: true
          description: Telegram user id to link, or null to unlink.
    InitEmailChangeRequest:
      type: object
      properties:
        email:
          type: string
          example: vito.cornleone@rentflowdev.ru
      required:
        - email
    ConfirmEmailChangeRequest:
      type: object
      properties:
        email:
          type: string
          example: vito.cornleone@rentflowdev.ru
        code:
          type: string
          example: '123456'
      required:
        - email
        - code
    InitPhoneChangeRequest:
      type: object
      properties:
        phone:
          type: string
          example: '+79111234567'
      required:
        - phone
    ConfirmPhoneChangeRequest:
      type: object
      properties:
        phone:
          type: string
          example: '+79111234567'
        code:
          type: string
          example: '123456'
      required:
        - phone
        - code
    UpsertCompanyProfileRequest:
      type: object
      properties:
        inn:
          type: string
          example: '7707083893'
        ogrn:
          type: string
          example: '1027700132195'
        kpp:
          type: string
          example: '770701001'
        name:
          type: string
          example: OOO RentFlow
        address:
          type: string
          example: Moscow, ul. Lenina, 1
        bik:
          type: string
          example: '044525225'
        bank:
          type: string
          example: PAO Sberbank
        bankAccount:
          type: string
          example: '40702810000000000001'
        corrAccount:
          type: string
          example: '30101810400000000225'
        signatory:
          type: string
          example: Ivanov I.I.
        registrationAddr:
          type: string
          example: Moscow, ul. Tverskaya, 5, kv. 12
        passportSeries:
          type: string
          example: '4509'
        passportNumber:
          type: string
          example: '123456'
        passportIssuedBy:
          type: string
          example: OUFMS Moscow district
        passportIssueDate:
          type: string
          example: '2015-06-12'
        passportDepartmentCode:
          type: string
          example: 770-001
        signatoryBasis:
          type: string
          enum:
            - PERSONAL
            - POWER_OF_ATTORNEY
            - CHARTER
            - OTHER
    InviteSubAccountRequest:
      type: object
      properties:
        fullName:
          type: string
          example: Иван Менеджеров
        phone:
          type: string
          example: '+79991234567'
        email:
          type: string
          example: manager@example.com
        role:
          type: string
          enum:
            - MANAGER
            - ACCOUNTANT
            - ADMIN
          example: MANAGER
        propertyIds:
          type: array
          items:
            type: string
      required:
        - fullName
        - role
    UpdateSubAccountRequest:
      type: object
      properties:
        role:
          type: string
          enum:
            - MANAGER
            - ACCOUNTANT
            - ADMIN
        status:
          type: string
          enum:
            - ACTIVE
            - INVITED
            - BLOCKED
    UploadCompanyDocumentRequest:
      type: object
      properties:
        kind:
          type: string
          enum:
            - REGISTRATION_CERTIFICATE
            - EGRUL_EXCERPT
            - CHARTER
            - OTHER
        fileUrl:
          type: string
          example: https://s3.example.com/docs/abc.pdf
        fileName:
          type: string
          example: Свидетельство.pdf
        fileSize:
          type: number
          example: 102400
        mimeType:
          type: string
          example: application/pdf
      required:
        - kind
        - fileUrl
        - fileName
    CreateAuthorizationRequest:
      type: object
      properties:
        accountId:
          type: string
          example: account-id-123
        clientId:
          type: string
          example: rentflow-web
        redirectUri:
          type: string
          example: https://app.rentflow.tech/callback
        codeChallenge:
          type: string
          example: E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM
        codeChallengeMethod:
          type: string
          example: S256
          enum:
            - S256
        state:
          type: string
          example: random-state-string
        scope:
          type: string
          example: profile account
      required:
        - accountId
        - clientId
        - redirectUri
        - codeChallenge
        - codeChallengeMethod
        - state
    ExchangeTokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          example: authorization_code
          enum:
            - authorization_code
        code:
          type: string
          example: authorization-code-here
        code_verifier:
          type: string
          example: pkce-code-verifier-string
        client_id:
          type: string
          example: rentflow-web
        redirect_uri:
          type: string
          example: https://app.rentflow.tech/callback
      required:
        - grant_type
        - code
        - code_verifier
        - client_id
        - redirect_uri
    CreateSessionRequest:
      type: object
      properties:
        accountId:
          type: string
          example: account-id-123
      required:
        - accountId
    GetMeResponse:
      type: object
      properties:
        id:
          type: string
          example: X6KBMTnCDkbrPN_I0YXG8
        name:
          type: string
          example: Anton Chigurh
        email:
          type: string
          example: anton.chigurh@rentflowdev.ru
        phone:
          type: string
          example: '+77777777777'
        avatar:
          type: string
          example: https://cdn.rentflowdev.ru/users/e0db4163fc2aab147599c750906396d3
      required:
        - id
        - email
        - phone
    PatchUserRequest:
      type: object
      properties:
        name:
          type: string
          example: Anton Chigurh
      required:
        - name
    PropertyManagerResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
      required:
        - id
        - name
    PropertyRentTermsResponse:
      type: object
      properties:
        id:
          type: string
        propertyId:
          type: string
        rentAmount:
          type: string
          example: '50000.00'
        rentCurrency:
          type: string
          example: RUB
        rentPeriod:
          type: string
          example: MONTHLY
        vatPercent:
          type: string
        depositAmount:
          type: string
        depositCurrency:
          type: string
        penaltyRate:
          type: string
        penaltyGraceDays:
          type: number
      required:
        - id
        - propertyId
        - rentAmount
        - rentCurrency
        - rentPeriod
        - depositCurrency
    PropertyImageResponse:
      type: object
      properties:
        id:
          type: string
        propertyId:
          type: string
        url:
          type: string
        order:
          type: number
          example: 0
      required:
        - id
        - propertyId
        - url
        - order
    PropertyUtilityResponse:
      type: object
      properties:
        id:
          type: string
        propertyId:
          type: string
        type:
          type: string
        calculation:
          type: string
        paidBy:
          type: string
        hasSeparateMeter:
          type: boolean
        meterNumber:
          type: string
        ratePerSqm:
          type: string
        fixedAmount:
          type: string
        coefficient:
          type: string
        propertyArea:
          type: string
        buildingArea:
          type: string
        currency:
          type: string
      required:
        - id
        - propertyId
        - type
        - calculation
        - paidBy
        - hasSeparateMeter
        - currency
    PropertyAdditionalServiceResponse:
      type: object
      properties:
        id:
          type: string
        propertyId:
          type: string
        name:
          type: string
        pricePerUnit:
          type: string
          example: '1500.00'
        currency:
          type: string
        quantity:
          type: string
          example: '1'
        unit:
          type: string
        includeVat:
          type: boolean
      required:
        - id
        - propertyId
        - name
        - pricePerUnit
        - currency
        - quantity
        - includeVat
    PropertyResponse:
      type: object
      properties:
        id:
          type: string
          example: X6KBMTnCDkbrPN_I0YXG8
        ownerId:
          type: string
          example: X6KBMTnCDkbrPN_I0YXG8
        managerId:
          type: string
          example: X6KBMTnCDkbrPN_I0YXG8
        status:
          type: string
          example: AVAILABLE
        type:
          type: string
          example: APARTMENT
        description:
          type: string
        address:
          type: string
          example: ul. Lenina, 42
        city:
          type: string
          example: Moscow
        cadastralNumber:
          type: string
          example: '47:14:0101001:123'
        area:
          type: string
          example: '65.5'
        livingArea:
          type: string
        rooms:
          type: number
          example: 3
        floor:
          type: number
          example: 5
        totalFloors:
          type: number
        yearBuilt:
          type: number
        buildingType:
          type: string
        renovation:
          type: string
        bathroom:
          type: string
        bathroomCount:
          type: number
        balcony:
          type: boolean
          example: false
        loggia:
          type: boolean
          example: false
        wardrobe:
          type: boolean
          example: false
        passengerElevator:
          type: number
          example: 1
        freightElevator:
          type: number
          example: 0
        parking:
          example:
            - underground
          type: array
          items:
            type: string
        yard:
          example:
            - playground
          type: array
          items:
            type: string
        concierge:
          type: boolean
          example: false
        chute:
          type: boolean
          example: false
        gas:
          type: boolean
          example: false
        furniture:
          type: array
          items:
            type: string
        appliances:
          type: array
          items:
            type: string
        internet:
          type: array
          items:
            type: string
        maxTenants:
          type: number
        childrenAllowed:
          type: boolean
          example: false
        petsAllowed:
          type: boolean
          example: false
        smokingAllowed:
          type: boolean
          example: false
        latitude:
          type: string
          example: '55.7558'
        longitude:
          type: string
          example: '37.6173'
        videoUrl:
          type: string
          example: https://youtu.be/abc
        manager:
          $ref: '#/components/schemas/PropertyManagerResponse'
        createdAt:
          type: string
          example: '2026-02-20T12:00:00.000Z'
        updatedAt:
          type: string
          example: '2026-02-20T12:00:00.000Z'
        rentTerms:
          $ref: '#/components/schemas/PropertyRentTermsResponse'
        images:
          type: array
          items:
            $ref: '#/components/schemas/PropertyImageResponse'
        utilities:
