openapi: 3.0.0
paths:
  /:
    get:
      description: Returns a simple API welcome message.
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      summary: Welcome endpoint
      tags:
        - App
  /health:
    get:
      description: Checks if the Gateway is running.
      operationId: AppController_health
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      summary: Health check
      tags:
        - App
  /metrics:
    get:
      operationId: PrometheusController_index
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - Prometheus
  /auth/otp/send:
    post:
      description: Sends a verification code to the user phone number or email.
      operationId: AuthController_sendOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: ''
      summary: Send otp code
      tags:
        - Auth
  /auth/otp/verify:
    post:
      description: >-
        Verifies the code sent to the user phone number or email and returns a
        access token.
      operationId: AuthController_verifyOtp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: ''
      summary: Verify otp code
      tags:
        - Auth
  /auth/refresh:
    post:
      description: Renews access token using refresh token from cookies
      operationId: AuthController_refresh
      parameters: []
      responses:
        '200':
          description: ''
      summary: Refresh access token
      tags:
        - Auth
  /auth/logout:
    post:
      description: Clears the refresh token cookie and logs the user out
      operationId: AuthController_logout
      parameters: []
      responses:
        '200':
          description: ''
      summary: Logout
      tags:
        - Auth
  /auth/telegram:
    get:
      operationId: AuthController_telegramInit
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - Auth
  /auth/telegram/verify:
    post:
      operationId: AuthController_telegramVerify
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramVerifyRequest'
      responses:
        '200':
          description: ''
      tags:
        - Auth
  /auth/dev-login:
    post:
      description: >-
        Issues a token pair for a seeded account without OTP. Available only
        when NODE_ENV=development. Body identifier accepts account id, email, or
        phone; defaults to dev-superuser.
      operationId: AuthController_devLogin
      parameters: []
      responses:
        '200':
          description: ''
      summary: Dev-only login (no OTP)
      tags:
        - Auth
  /auth/telegram/finalize:
    post:
      operationId: AuthController_finalizeTelegramLogin
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramFinalizeRequest'
      responses:
        '200':
          description: ''
      tags:
        - Auth
  /account/type:
    patch:
      description: Sets the account type to INDIVIDUAL, ENTREPRENEUR or COMPANY.
      operationId: AccountController_updateAccountType
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountTypeRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Update account type
      tags:
        - Account
  /account/telegram:
    put:
      description: Links or unlinks (telegramId=null) the Telegram account.
      operationId: AccountController_updateTelegram
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTelegramRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Update telegram link
      tags:
        - Account
  /account/email/init:
    post:
      description: Sends confirmation code to a new email address.
      operationId: AccountController_initEmailChange
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitEmailChangeRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Init email change
      tags:
        - Account
  /account/email/confirm:
    post:
      description: Verifies confirmation code and updates user email address.
      operationId: AccountController_confirmEmailChange
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailChangeRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Confirm email change
      tags:
        - Account
  /account/phone/init:
    post:
      description: Sends confirmation code to a new phone number.
      operationId: AccountController_initPhoneChange
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitPhoneChangeRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Init phone change
      tags:
        - Account
  /account/phone/confirm:
    post:
      description: Verifies confirmation code and updates user phone number.
      operationId: AccountController_confirmPhoneChange
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPhoneChangeRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Confirm phone change
      tags:
        - Account
  /account/company:
    get:
      description: Returns CompanyProfile of the current account.
      operationId: AccountController_getCompanyProfile
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Get company profile
      tags:
        - Account
    put:
      description: Creates or updates CompanyProfile for ENTREPRENEUR / COMPANY accounts.
      operationId: AccountController_upsertCompanyProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCompanyProfileRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Upsert company profile
      tags:
        - Account
  /account/sub-accounts:
    get:
      description: Returns sub-accounts (agents/managers) of the current account.
      operationId: AccountController_listSubAccounts
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: List sub-accounts
      tags:
        - Account
    post:
      operationId: AccountController_inviteSubAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteSubAccountRequest'
      responses:
        '201':
          description: ''
      security:
        - bearer: []
      summary: Invite sub-account
      tags:
        - Account
  /account/sub-accounts/{id}:
    patch:
      operationId: AccountController_updateSubAccount
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubAccountRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Update sub-account (role/status)
      tags:
        - Account
    delete:
      operationId: AccountController_deleteSubAccount
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Delete sub-account
      tags:
        - Account
  /account/documents:
    get:
      operationId: AccountController_listCompanyDocuments
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: List company documents
      tags:
        - Account
    post:
      operationId: AccountController_uploadCompanyDocument
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCompanyDocumentRequest'
      responses:
        '201':
          description: ''
      security:
        - bearer: []
      summary: Upload (register) company document metadata
      tags:
        - Account
  /account/documents/{id}:
    delete:
      operationId: AccountController_deleteCompanyDocument
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Delete company document
      tags:
        - Account
  /account/{id}:
    get:
      description: Returns the Account aggregate by id.
      operationId: AccountController_getAccount
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get account by id
      tags:
        - Account
  /oauth/authorize:
    get:
      description: >-
        Validates client_id and redirect_uri, checks for existing session.
        Called by OAuth App on /authorize page load.
      operationId: OAuthController_authorize
      parameters:
        - name: client_id
          required: true
          in: query
          schema:
            example: rentflow-web
            type: string
        - name: redirect_uri
          required: true
          in: query
          schema:
            example: https://app.rentflow.tech/callback
            type: string
        - name: response_type
          required: true
          in: query
          schema:
            example: code
            type: string
            enum:
              - code
        - name: state
          required: true
          in: query
          schema:
            example: random-state-string
            type: string
        - name: code_challenge
          required: true
          in: query
          schema:
            example: E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM
            type: string
        - name: code_challenge_method
          required: true
          in: query
          schema:
            example: S256
            type: string
            enum:
              - S256
        - name: scope
          required: false
          in: query
          schema:
            example: profile account
            type: string
      responses:
        '200':
          description: ''
      summary: Validate OAuth client
      tags:
        - OAuth
    post:
      description: >-
        Creates an authorization code after successful login/consent. Returns
        code + state for redirect.
      operationId: OAuthController_createAuthorization
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizationRequest'
      responses:
        '200':
          description: ''
      summary: Create authorization code
      tags:
        - OAuth
  /oauth/token:
    post:
      description: >-
        Exchanges an authorization code + PKCE code_verifier for access and
        refresh tokens.
      operationId: OAuthController_exchangeToken
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeTokenRequest'
      responses:
        '200':
          description: ''
      summary: Exchange authorization code for tokens
      tags:
        - OAuth
  /oauth/session:
    post:
      description: >-
        Creates a session after successful login on the OAuth app. Sets httpOnly
        cookie.
      operationId: OAuthController_createSession
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: ''
      summary: Create OAuth session
      tags:
        - OAuth
  /users/@me:
    get:
      description: Returns authenticated user profile data.
      operationId: UsersController_getMe
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'
      security:
        - bearer: []
      summary: Get current user profile
      tags:
        - Users
    patch:
      operationId: UsersController_patchUser
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserRequest'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      tags:
        - Users
  /properties:
    get:
      operationId: PropertyController_listProperties
      parameters:
        - name: page
          required: false
          in: query
          schema:
            default: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            default: 20
            example: 20
            type: number
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - DRAFT
              - AVAILABLE
              - RENTED
              - ARCHIVED
        - name: city
          required: false
          in: query
          schema:
            example: Moscow
            type: string
        - name: type
          required: false
          in: query
          schema:
            type: string
            enum:
              - APARTMENT
              - HOUSE
              - ROOM
              - OFFICE
              - LAND
        - name: rooms
          required: false
          in: query
          schema:
            example: 3
            type: number
        - name: areaMin
          required: false
          in: query
          schema:
            example: '30'
            type: string
        - name: areaMax
          required: false
          in: query
          schema:
            example: '150'
            type: string
        - name: search
          required: false
          in: query
          schema:
            example: lenina
            type: string
        - name: sortBy
          required: false
          in: query
          schema:
            default: createdAt
            type: string
            enum:
              - createdAt
              - area
              - rooms
        - name: sortOrder
          required: false
          in: query
          schema:
            default: desc
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPropertiesResponse'
      security:
        - bearer: []
      summary: List properties
      tags:
        - Properties
    post:
      description: >-
        Creates property + optional rentTerms, images, utilities,
        additionalServices in a single call.
      operationId: PropertyController_createProperty
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePropertyRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
      security:
        - bearer: []
      summary: Create property (atomic with sub-resources)
      tags:
        - Properties
  /properties/{id}:
    get:
      operationId: PropertyController_getProperty
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
      security:
        - bearer: []
      summary: Get property by ID
      tags:
        - Properties
    patch:
      operationId: PropertyController_updateProperty
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
      security:
        - bearer: []
      summary: Update property
      tags:
        - Properties
    delete:
      operationId: PropertyController_deleteProperty
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Delete property
      tags:
        - Properties
  /properties/{id}/status:
    patch:
      operationId: PropertyController_updatePropertyStatus
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePropertyStatusRequest'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
      security:
        - bearer: []
      summary: Update property status
      tags:
        - Properties
  /properties/upload-url:
    post:
      description: >-
        Returns a short-lived presigned PUT URL for direct upload from the
